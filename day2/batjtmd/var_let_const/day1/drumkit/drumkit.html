<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drumkit</title>
    <link rel="stylesheet" href="./drumkit.css" />
</head>
<body>
    <!-- emmet简写 -->
    <div class="all">
        <div class="word" data-key = "65">
            <h1>A</h1>
            <span class="sound">tele</span>
        </div>
        <div class="word" data-key = "68">
            <h1>D</h1>
            <span class="sound">sad</span>
        </div>
        <div class="word playing" data-key = "67">
            <h1>C</h1>
            <span class="sound">fas</span>
        </div>
        <div class="word" data-key="66">
            <h1>B</h1>
            <span class="sound">ew</span>
        </div>
        <div class="word" data-key = "84">
            <h1>T</h1>
            <span class="sound">ytas</span>
        </div>
        <div class="word" data-key = "82">
            <h1>R</h1>
            <span class="sound">assg</span>
        </div>
        <div class="word" data-key="71">
            <h1>G</h1>
            <span class="sound">sagh</span>
        </div>
        <div class="word" data-key="77">
            <h1>M</h1>
            <span class="sound">sahhh</span>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
