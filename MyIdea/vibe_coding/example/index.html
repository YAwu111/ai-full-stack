<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Momentum Todo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <aside class="hero-panel">
      <p class="eyebrow">专注系统</p>
      <h1>计划它，完成它，清空它。</h1>
      <p class="hero-copy">
        一个完成度很高的 TodoList 页面示例，支持新增、完成、置顶、删除、筛选、搜索、进度统计和本地持久化。
      </p>

      <div class="hero-card">
        <div class="hero-metric">
          <span id="completionRate">0%</span>
          <small>今日完成率</small>
        </div>
        <div class="hero-bars" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="tips-card">
        <h2>专注建议</h2>
        <ul>
          <li>把大任务拆成短时间内可完成的小块。</li>
          <li>优先处理真正会推动结果的事项。</li>
          <li>完成后及时清空列表，减少视觉负担。</li>
        </ul>
      </div>
    </aside>

    <main class="app-panel">
      <section class="topbar">
        <div>
          <p class="eyebrow">高完成度待办</p>
          <h2>今天想推进什么事情？</h2>
        </div>
        <div class="date-badge" id="todayLabel"></div>
      </section>

      <section class="composer-card">
        <form id="todoForm" class="composer-form">
          <label class="input-wrap title-wrap">
            <span>任务标题</span>
            <input id="todoInput" name="title" type="text" maxlength="80" placeholder="例如：整理首页落地页文案" required>
          </label>

          <label class="input-wrap">
            <span>分类</span>
            <select id="todoCategory" name="category">
              <option value="工作">工作</option>
              <option value="学习">学习</option>
              <option value="生活">生活</option>
              <option value="健康">健康</option>
            </select>
          </label>

          <label class="input-wrap">
            <span>优先级</span>
            <select id="todoPriority" name="priority">
              <option value="high">高</option>
              <option value="medium" selected>中</option>
              <option value="low">低</option>
            </select>
          </label>

          <button class="primary-btn" type="submit">添加任务</button>
        </form>
      </section>

      <section class="toolbar-card">
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="搜索任务标题或分类">
        </div>

        <div class="filter-group" role="tablist" aria-label="任务筛选">
          <button class="filter-btn active" data-filter="all" type="button">全部</button>
          <button class="filter-btn" data-filter="active" type="button">进行中</button>
          <button class="filter-btn" data-filter="completed" type="button">已完成</button>
          <button class="filter-btn" data-filter="pinned" type="button">已置顶</button>
        </div>
      </section>

      <section class="stats-grid" id="statsGrid">
        <article class="stat-card">
          <strong id="totalCount">0</strong>
          <span>总任务数</span>
        </article>
        <article class="stat-card">
          <strong id="activeCount">0</strong>
          <span>待处理</span>
        </article>
        <article class="stat-card">
          <strong id="doneCount">0</strong>
          <span>已完成</span>
        </article>
        <article class="stat-card">
          <strong id="pinnedCount">0</strong>
          <span>已置顶</span>
        </article>
      </section>

      <section class="list-card">
        <div class="section-head">
          <h3>任务列表</h3>
          <button id="clearCompletedBtn" class="ghost-btn" type="button">清除已完成</button>
        </div>

        <div id="emptyState" class="empty-state" hidden>
          <h4>当前还没有任务</h4>
          <p>先添加一个任务，让这个页面真正开始工作起来。</p>
        </div>

        <ul id="todoList" class="todo-list" aria-live="polite"></ul>
      </section>
    </main>
  </div>

  <template id="todoItemTemplate">
    <li class="todo-item">
      <button class="check-btn" type="button" aria-label="切换完成状态"></button>
      <div class="todo-content">
        <div class="todo-main">
          <h4 class="todo-title"></h4>
          <div class="meta-row">
            <span class="category-pill"></span>
            <span class="priority-pill"></span>
            <span class="time-pill"></span>
          </div>
        </div>
        <div class="todo-actions">
          <button class="mini-btn pin-btn" type="button">置顶</button>
          <button class="mini-btn delete-btn" type="button">删除</button>
        </div>
      </div>
    </li>
  </template>

  <script src="./script.js"></script>
</body>
</html>
