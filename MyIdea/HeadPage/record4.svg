<svg viewBox="0 0 240 240" width="240" height="240" xmlns="http://www.w3.org/2000/svg">

  <!-- 渐变 -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>

    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </linearGradient>

    <!-- 发光滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <circle cx="120" cy="120" r="110" fill="url(#bg)"/>

  <!-- 外圈霓虹环 -->
  <circle cx="120" cy="120" r="95"
          fill="none"
          stroke="url(#neon)"
          stroke-width="4"
          stroke-dasharray="8 6"
          filter="url(#glow)"/>

  <!-- 内圈节奏线（不对称） -->
  <g stroke="url(#neon)" stroke-width="2" opacity="0.7">
    <path d="M40 120 A80 80 0 0 1 200 120" fill="none"/>
    <path d="M60 120 A60 60 0 0 0 180 120" fill="none"/>
  </g>

  <!-- 高频条纹（像音波） -->
  <g stroke="#00f5ff" stroke-width="1" opacity="0.4">
    <line x1="120" y1="40" x2="120" y2="70"/>
    <line x1="130" y1="45" x2="130" y2="75"/>
    <line x1="140" y1="50" x2="140" y2="80"/>
  </g>

  <!-- 中心 label -->
  <circle cx="120" cy="120" r="35" fill="#111"/>

  <!-- label 装饰（不对称块） -->
  <path d="M120 120 L155 120 A35 35 0 0 1 120 155 Z"
        fill="url(#neon)" opacity="0.8"/>

  <!-- 中心孔 -->
  <circle cx="120" cy="120" r="6" fill="#fff"/>

  <!-- 小光点（增强旋转感） -->
  <circle cx="180" cy="130" r="3" fill="#00f5ff"/>
  <circle cx="70" cy="170" r="2" fill="#9d4edd"/>

</svg>