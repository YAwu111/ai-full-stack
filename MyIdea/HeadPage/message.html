<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 - 奶龙大王</title>
    <link rel="icon" href="icon.png" type="png"></link>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(80% 60% at 50% -20%, rgba(89, 230, 255, 0.22), transparent 65%),
                linear-gradient(180deg, #f4fdff 0%, #e9f8fb 100%);
            color: #143844;
            padding: 22px 14px 40px;
        }
        .wrap {
            width: min(960px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 16px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .top-bar h1 {
            font-size: clamp(1.35rem, 4.2vw, 2rem);
            letter-spacing: 0.06em;
        }
        .top-bar a {
            color: #0f5f6f;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .panel {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(89, 230, 255, 0.32);
            border-radius: 18px;
            box-shadow: 0 12px 36px rgba(15, 70, 85, 0.12);
            backdrop-filter: blur(8px);
            padding: clamp(14px, 3.6vw, 24px);
        }
        .desc {
            color: #416570;
            line-height: 1.7;
            margin-bottom: 12px;
        }
        .form-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr 1fr;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field--full { grid-column: 1 / -1; }
        .field label {
            font-size: 0.82rem;
            color: #3f6570;
        }
        .field input,
        .field textarea {
            width: 100%;
            font: inherit;
            border: 1px solid rgba(20, 56, 68, 0.2);
            border-radius: 10px;
            padding: 10px 12px;
            background: #fff;
            color: #173f4b;
            outline: none;
        }
        .field textarea {
            min-height: 120px;
            resize: vertical;
        }
        .field input:focus,
        .field textarea:focus {
            border-color: rgba(89, 230, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(89, 230, 255, 0.18);
        }
        .actions {
            margin-top: 2px;
            display: flex;
            justify-content: flex-end;
        }
        .btn {
            border: none;
            border-radius: 999px;
            padding: 10px 22px;
            font: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            color: #0b3340;
            background: linear-gradient(135deg, #8af5ff 0%, #59e6ff 100%);
            cursor: pointer;
        }
        .btn:active { transform: translateY(1px); }
        .status {
            margin-top: 10px;
            font-size: 0.82rem;
            color: #4a717c;
            min-height: 1.2em;
        }
        .list-title {
            margin-bottom: 10px;
            font-size: 1.02rem;
            color: #153f4b;
        }
        .messages {
            display: grid;
            gap: 10px;
        }
        .item {
            border: 1px solid rgba(20, 56, 68, 0.12);
            border-radius: 12px;
            background: #fff;
            padding: 10px 12px;
        }
        .meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.78rem;
            color: #67848d;
            margin-bottom: 5px;
        }
        .content {
            color: #2a505b;
            font-size: 0.9rem;
            line-height: 1.65;
            white-space: pre-wrap;
        }
        @media (max-width: 680px) {
            .form-grid { grid-template-columns: 1fr; }
            .field--full { grid-column: auto; }
            .actions { justify-content: stretch; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <header class="top-bar">
            <h1>留言板</h1>
            <a href="./index.html">返回首页</a>
        </header>

        <section class="panel" aria-label="留言表单">
            <p class="desc">欢迎留下你的想法、建议或合作意向。提交后会在下方“最近留言”区域即时显示（演示版本地展示）。</p>
            <form id="messageForm" class="form-grid">
                <div class="field">
                    <label for="name">昵称</label>
                    <input id="name" name="name" type="text" placeholder="例如：奶龙粉丝A" required>
                </div>
                <div class="field">
                    <label for="contact">联系方式（选填）</label>
                    <input id="contact" name="contact" type="text" placeholder="邮箱或手机号">
                </div>
                <div class="field field--full">
                    <label for="message">留言内容</label>
                    <textarea id="message" name="message" placeholder="写下你想说的话..." required></textarea>
                </div>
                <div class="field field--full actions">
                    <button type="submit" class="btn">提交留言</button>
                </div>
            </form>
            <p id="status" class="status"></p>
        </section>

        <section class="panel" aria-label="最近留言">
            <h2 class="list-title">最近留言</h2>
            <div class="messages" id="messageList">
                <article class="item">
                    <div class="meta">
                        <span>系统</span>
                        <time>刚刚</time>
                    </div>
                    <p class="content">欢迎来到留言板，期待你的建议与反馈！</p>
                </article>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("messageForm");
        const list = document.getElementById("messageList");
        const statusText = document.getElementById("status");

        function formatTime(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, "0");
            const d = String(date.getDate()).padStart(2, "0");
            const hh = String(date.getHours()).padStart(2, "0");
            const mm = String(date.getMinutes()).padStart(2, "0");
            return y + "-" + m + "-" + d + " " + hh + ":" + mm;
        }

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const data = new FormData(form);
            const name = (data.get("name") || "").toString().trim();
            const contact = (data.get("contact") || "").toString().trim();
            const message = (data.get("message") || "").toString().trim();
            if (!name || !message) return;

            const card = document.createElement("article");
            card.className = "item";
            card.innerHTML =
                '<div class="meta">' +
                "<span>" + name + (contact ? "（" + contact + "）" : "") + "</span>" +
                "<time>" + formatTime(new Date()) + "</time>" +
                "</div>" +
                '<p class="content"></p>';
            card.querySelector(".content").textContent = message;

            list.prepend(card);
            form.reset();
            statusText.textContent = "留言提交成功（演示版：仅本地显示）";
            setTimeout(() => {
                statusText.textContent = "";
            }, 1800);
        });
    </script>
</body>
</html>
