<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI聊天界面 - 奶龙大王</title>
    <link rel="icon" href="icon.png" type="png"></link>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(90% 70% at 50% -10%, rgba(89, 230, 255, 0.2), transparent 62%),
                linear-gradient(180deg, #f4feff 0%, #eaf9fc 100%);
            color: #103844;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }
        .chat-app {
            width: min(920px, 100%);
            height: min(760px, calc(100vh - 36px));
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(89, 230, 255, 0.35);
            border-radius: 20px;
            box-shadow: 0 18px 48px rgba(12, 64, 78, 0.16);
            backdrop-filter: blur(10px);
            display: grid;
            grid-template-rows: auto 1fr auto;
            overflow: hidden;
        }
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(16, 56, 68, 0.1);
            background: rgba(255, 255, 255, 0.75);
        }
        .chat-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .bot-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #27c97b;
            box-shadow: 0 0 0 4px rgba(39, 201, 123, 0.2);
        }
        .chat-title h1 {
            font-size: 1rem;
            letter-spacing: 0.04em;
        }
        .chat-title p {
            font-size: 0.78rem;
            color: #537580;
        }
        .header-actions a {
            text-decoration: none;
            color: #0f5f6f;
            font-size: 0.82rem;
            font-weight: 600;
        }
        .messages {
            overflow-y: auto;
            padding: 16px 14px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: min(78%, 620px);
            padding: 11px 13px;
            border-radius: 14px;
            line-height: 1.65;
            font-size: 0.93rem;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .message.ai {
            align-self: flex-start;
            background: #ffffff;
            border: 1px solid rgba(16, 56, 68, 0.12);
            color: #1b4856;
            border-top-left-radius: 6px;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #59e6ff 0%, #3ed7f4 100%);
            color: #0a2d37;
            border-top-right-radius: 6px;
        }
        .composer {
            border-top: 1px solid rgba(16, 56, 68, 0.1);
            background: rgba(255, 255, 255, 0.86);
            padding: 12px;
        }
        .composer-form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }
        .composer textarea {
            width: 100%;
            min-height: 48px;
            max-height: 144px;
            resize: vertical;
            border: 1px solid rgba(16, 56, 68, 0.2);
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
            font-size: 0.92rem;
            color: #123f4b;
            background: #fff;
            outline: none;
        }
        .composer textarea:focus {
            border-color: rgba(89, 230, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(89, 230, 255, 0.2);
        }
        .send-btn {
            border: none;
            border-radius: 12px;
            min-width: 94px;
            padding: 0 16px;
            font: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            color: #08313a;
            background: linear-gradient(135deg, #8af5ff 0%, #59e6ff 100%);
            cursor: pointer;
            transition: filter 0.2s ease, transform 0.2s ease;
        }
        .send-btn:hover {
            filter: brightness(1.03);
        }
        .send-btn:active {
            transform: translateY(1px);
        }
        .hint {
            margin-top: 8px;
            color: #597982;
            font-size: 0.76rem;
        }
        @media (max-width: 640px) {
            .chat-app {
                height: calc(100vh - 20px);
                border-radius: 14px;
            }
            .message {
                max-width: 88%;
            }
            .composer-form {
                grid-template-columns: 1fr;
            }
            .send-btn {
                height: 42px;
            }
        }
    </style>
</head>
<body>
    <main class="chat-app" aria-label="AI聊天界面">
        <header class="chat-header">
            <div class="chat-title">
                <span class="bot-dot" aria-hidden="true"></span>
                <div>
                    <h1>奶龙 AI 助手</h1>
                    <p>在线 · 可快速回答页面相关问题</p>
                </div>
            </div>
            <div class="header-actions">
                <a href="./index.html">返回首页</a>
            </div>
        </header>

        <section class="messages" id="messages" aria-live="polite">
            <article class="message ai">你好，我是奶龙 AI 助手！你可以问我：页面介绍、服务流程、联系方式、常见问题等。</article>
        </section>

        <section class="composer">
            <form class="composer-form" id="chatForm">
                <label for="userInput" style="display:none;">输入消息</label>
                <textarea id="userInput" placeholder="输入你的问题，按 Enter 发送，Shift + Enter 换行"></textarea>
                <button type="submit" class="send-btn">发送</button>
            </form>
            <p class="hint">已接入 DeepSeek：模型 `deepseek-v4-pro`。</p>
        </section>
    </main>

    <script>
        const chatForm = document.getElementById("chatForm");
        const userInput = document.getElementById("userInput");
        const messages = document.getElementById("messages");
        const sendBtn = document.querySelector(".send-btn");

        const DEEPSEEK_API_KEY = "sk-302641417c254e92b5f6a963e2e70caf";
        const DEEPSEEK_URL = "https://api.deepseek.com/chat/completions";
        const MODEL_NAME = "deepseek-v4-pro";
        const SYSTEM_PROMPT = "现在你是一个奶龙，动画《奶龙》系列及其衍生作品中的主角，根据用户提示，回答对应问题，不超出角色本身";

        const chatHistory = [
            { role: "system", content: SYSTEM_PROMPT }
        ];

        function appendMessage(role, text) {
            const item = document.createElement("article");
            item.className = "message " + role;
            item.textContent = text;
            messages.appendChild(item);
            messages.scrollTop = messages.scrollHeight;
            return item;
        }

        async function getDeepSeekReply() {
            const response = await fetch(DEEPSEEK_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + DEEPSEEK_API_KEY
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: chatHistory,
                    temperature: 0.8
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error("请求失败: " + response.status + " " + errorText);
            }

            const data = await response.json();
            return data.choices?.[0]?.message?.content?.trim() || "抱歉，我一时不知道怎么回答。";
        }

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const content = userInput.value.trim();
            if (!content) return;

            appendMessage("user", content);
            chatHistory.push({ role: "user", content });
            userInput.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "思考中...";

            const loadingNode = appendMessage("ai", "奶龙正在想一想...");

            try {
                const reply = await getDeepSeekReply();
                loadingNode.textContent = reply;
                chatHistory.push({ role: "assistant", content: reply });
            } catch (error) {
                loadingNode.textContent = "抱歉，连接 AI 服务失败，请稍后再试。\n" + error.message;
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "发送";
                userInput.focus();
            }
        });

        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                chatForm.requestSubmit();
            }
        });
    </script>
</body>
</html>
