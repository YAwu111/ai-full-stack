<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>触发式双层卡片</title>

<style>
body {
    margin: 0;
    height: 200vh;
    font-family: sans-serif;
    overflow-x: hidden;
}

/* 第一层 */
.layer1 {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #6dd5ed, #2193b0);
    z-index: 1;

    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: white;
}

/* 第二层 */
.layer2 {
    position: fixed;
    inset: 0;
    background: #f5f5f5;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.2);

    transform: translateY(70%); /* 初始露出 */
    transition: transform 0.5s ease;

    z-index: 2;
    padding: 20px;
}

/* 👇 展开状态 */
.layer2.active {
    transform: translateY(0%);
}
</style>
</head>

<body>

<div class="layer1">
    第一层页面
</div>

<div class="layer2" id="panel">
    <h2>第二层内容</h2>
</div>

<script>
const panel = document.getElementById('panel');

let isOpen = false;
let isAnimating = false;

window.addEventListener('wheel', (e) => {
    if (isAnimating) return;

    if (e.deltaY > 0 && !isOpen) {
        // 向下滚 → 展开
        panel.classList.add('active');
        isOpen = true;
        lock();
    } else if (e.deltaY < 0 && isOpen) {
        // 向上滚 → 收回
        panel.classList.remove('active');
        isOpen = false;
        lock();
    }
});

function lock() {
    isAnimating = true;
    setTimeout(() => {
        isAnimating = false;
    }, 500); // 和 transition 一致
}
</script>

</body>
</html>
