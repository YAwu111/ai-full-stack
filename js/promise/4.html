<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="members">
    </ul>
    <script>
        fetch('https://api.github.com/orgs/lemoncode/members')
        .then(data => data.json())
        .then(res =>{
            const target = res.map(content =>
                `
                    <li>
                    ${content.login}
                    </li>
                `
            ).join("");
            document.getElementById("members").innerHTML=target;
        })
    </script>
</body>
</html>
