<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手写sleep函数</title>
</head>
<body>
    <script>
        function sleep(time){
            let p;
            p = new Promise((resolve,reject) =>{
                console.log(p);
                setTimeout(()=>{
                    // resolve();
                    console.log(p);
                    reject();
                    console.log(p);
                },time);
            })
            return p;
        }
        sleep(1000).then(()=>{console.log('sb')})
        .catch(()=>{console.log('err')});
    </script>
</body>
</html>
