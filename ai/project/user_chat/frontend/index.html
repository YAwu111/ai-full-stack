<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Chatbot</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.0.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
      <!-- PC端页面框架 
    bootstrap Layout 行列 
    列的布局， 总共12个单位， 
  col-md-6 一半

  -->
    <div class="container">
        <div class="row col-md-6 col-md-offset-3">
            <table class="table table-striped" id="user_table">
                <thead>
                    <!-- 表头 -->
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>家乡</th>
                    </tr>
                </thead>
                <tbody>

                </tbody>
            </table>
        </div>
        <div class="row">
            <form action="#" name="aiForm">
                <div class="form-group">
                    <label for="questionInput">请输入问题:</label>
                    <input type="text"
                    id="questionInput"
                    class="form-control"
                    name="question"
                    required
                    placeholder="请输入问题">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">提交</button>
                </div>
            </form>
        </div>
        <div class="row" id="message"></div>
    </div>
    <script>
        const oForm=document.forms["aiForm"];
        const oBody=document.querySelector("#user_table tbody");
        const oBtn=document.querySelector(".btn");
        let users;

        oForm.addEventListener("submit",(event)=>{
            event.preventDefault();
            const question=oForm["question"].value;
            // console.log(question);
            // llm api 发送请求
            if(!question){
                alert("请输入问题")
                return;
            }
            oBtn.disabled=true;
            fetch(`http://localhost:1314/?question=${question}&data=${JSON.stringify(users)}`)
            .then(res => res.json())
            .then(data=>{
                console.log(data);
                oBtn.disabled=false;
                document.getElementById('message').innerHTML = data.result;
            })
        })
        // 前后端通信
        // js fetch 主动的向后端发送请求
        fetch('http://localhost:3001/users')
            // 数据到达后，then接着做
            .then(res=>res.json())
            .then(data=>{
                // console.log(data);
                users=data;
                oBody.innerHTML=data.map(user=>
                    `<tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.hometown}</td>
                    </tr>
                    `).join("");
            })
    </script>
</body>
</html>
