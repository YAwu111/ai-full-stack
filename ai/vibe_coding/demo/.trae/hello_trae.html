<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Trae</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: bounce 2s ease-in-out infinite;
        }
        
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #666;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .counter {
            margin: 30px 0;
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .container {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello Trae!</h1>
        <p>欢迎使用 Trae 开发工具，这是一个简单的演示页面。</p>
        <div class="counter" id="counter">0</div>
        <button class="btn" onclick="incrementCounter()">增加计数</button>
        <button class="btn" onclick="resetCounter()">重置计数</button>
    </div>
    
    <script>
        let count = 0;
        const counterElement = document.getElementById('counter');
        
        function incrementCounter() {
            count++;
            counterElement.textContent = count;
            // 添加数字变化动画
            counterElement.style.animation = 'none';
            setTimeout(() => {
                counterElement.style.animation = 'bounce 0.5s ease-in-out';
            }, 10);
        }
        
        function resetCounter() {
            count = 0;
            counterElement.textContent = count;
            counterElement.style.animation = 'none';
            setTimeout(() => {
                counterElement.style.animation = 'bounce 0.5s ease-in-out';
            }, 10);
        }
        
        // 页面加载完成后显示欢迎消息
        window.onload = function() {
            setTimeout(() => {
                alert('Hello Trae! 欢迎访问这个演示页面！');
            }, 1000);
        };
    </script>
</body>
</html>
